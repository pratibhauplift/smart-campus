<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="dashboard-title">
    STUDENT DASHBOARD
</h1>

<body>



<div class="stats">

    <div class="stat-card">
        <h2>0</h2>
        <p>Total Complaints</p>
    </div>

    <div class="stat-card">
        <h2>0</h2>
        <p>Pending</p>
    </div>

    <div class="stat-card">
        <h2>0</h2>
        <p>Resolved</p>
    </div>

</div>

<div class="dashboard">

    <div class="card">
        <h2>📢</h2>
        <p>Submit Complaint</p>
    </div>

    <div class="card">
        <h2>📍</h2>
        <p>Track Complaint</p>
    </div>

    <div class="card">
        <h2>🏫</h2>
        <p>Book Resource</p>
    </div>

    <div class="card">
        <h2>🔔</h2>
        <p>Notifications</p>
    </div>

</div>

</body>

</body>
</html>
