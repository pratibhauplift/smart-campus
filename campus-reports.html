<!DOCTYPE html>
<html lang="en">

<head>

    <title>Campus Reports</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>📊 Campus Reports</h1>

    <div class="reports-container">

        <div class="report-card">
            <h2>120</h2>
            <p>Total Complaints</p>
        </div>

        <div class="report-card">
            <h2>95</h2>
            <p>Resolved Complaints</p>
        </div>

        <div class="report-card">
            <h2>25</h2>
            <p>Pending Complaints</p>
        </div>

        <div class="report-card">
            <h2>85%</h2>
            <p>Resource Utilization</p>
        </div>

    </div>

    <div class="summary-box">

        <h2>Campus Performance Summary</h2>

        <p>
            The campus is operating efficiently with most complaints resolved.
            Resource utilization is high and maintenance activities are being
            monitored regularly.
        </p>

    </div>

    <a href="director.html">
