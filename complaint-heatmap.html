<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Complaint Heatmap</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🔥 Complaint Heatmap</h1>

    <div class="heatmap-container">

        <div class="heatmap-box high">
            <h3>Hostel Block</h3>
            <p>15 Complaints</p>
        </div>

        <div class="heatmap-box medium">
            <h3>Library</h3>
            <p>8 Complaints</p>
        </div>

        <div class="heatmap-box low">
            <h3>Computer Lab</h3>
            <p>3 Complaints</p>
        </div>

        <div class="heatmap-box high">
            <h3>Academic Block A</h3>
            <p>12 Complaints</p>
        </div>

        <div class="heatmap-box medium">
            <h3>Seminar Hall</h3>
            <p>6 Complaints</p>
        </div>

        <div class="heatmap-box low">
            <h3>Sports Complex</h3>
            <p>2 Complaints</p>
        </div>

    </div>

    <div class="legend">

        <h2>Heatmap Legend</h2>

        <div class="legend-item">
            🔴 High Complaint Area
        </div>

        <div class="legend-item">
            🟠 Medium Complaint Area
        </div>

        <div class="legend-item">
            🟢 Low Complaint Area
        </div>

    </div>

    <a href="director.html">
        <button class="back-btn">
            ⬅ Back to Director Dashboard
        </button>
    </a>

</body>

</html>
