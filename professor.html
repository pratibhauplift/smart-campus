<!DOCTYPE html>
<html>
<head>
    <title>Professor Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Professor Dashboard</h1>

<div class="stats-container">

    <div class="stat-card">
        <h2>0</h2>
        <p>Total Requests</p>
    </div>

    <div class="stat-card">
        <h2>0</h2>
        <p>Approved</p>
    </div>

    <div class="stat-card">
        <h2>0</h2>
        <p>Pending</p>
    </div>

</div>

<div class="card-container">

    <div class="card">
        <h3>📢 Report Issue</h3>
    </div>

    <div class="card">
        <h3>🏫 Book Classroom</h3>
    </div>

    <div class="card">
        <h3>💻 Request Equipment</h3>
    </div>

    <div class="card">
        <h3>📚 View Resources</h3>
    </div>

</div>

</body>
</html>
