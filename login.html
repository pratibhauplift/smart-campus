<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Campus</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

     <div class="login-container">

        <div class="login-card">

            <h1>SMART CAMPUS</h1>

            <p class="welcome-text">
                Welcome Back 
            </p>

            
 
            <form>

                <input
                    type="email"
                    placeholder="Enter Email Address"
                    required>

                <input
                    type="password"
                    placeholder="Enter Password"
                    required>

                <h3 class="role-title">
                    Choose Your Role
                </h3> 

                <div class="role-container">

                    <div class="role-card" onclick="selectRole('student')">
    👨‍🎓 Student
</div>

<div class="role-card" onclick="selectRole('professor')">
    👨‍🏫 Professor
</div>

<div class="role-card" onclick="selectRole('staff')">
    👨‍💼 Staff
</div>

<div class="role-card" onclick="selectRole('admin')">
    ⚙️ Admin
</div>

<div class="role-card" onclick="selectRole('director')">
    🏛 Director
</div>

                </div>

                <button
    type="button"
    class="login-btn"
    onclick="loginUser()">

    Login

</button>

            </form>

            <a href="#" class="forgot-link">
                Forgot Password?
            </a>

        </div>

    </div>
    <script src="script.js"></script>
</body>

</body>

</html>
